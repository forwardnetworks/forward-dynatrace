apiVersion: batch/v1
kind: CronJob
metadata:
  name: forward-dynatrace-connector
  labels:
    app.kubernetes.io/name: forward-dynatrace-connector
    app.kubernetes.io/part-of: forward-dynatrace
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: forward-dynatrace-connector
            app.kubernetes.io/part-of: forward-dynatrace
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: importer
              image: registry.example.com/forward-dynatrace-importer:1.0.6
              imagePullPolicy: IfNotPresent
              args:
                - "--config"
                - "/etc/forward-dynatrace/forward-connector.config.json"
              env:
                - name: FORWARD_USER
                  valueFrom:
                    secretKeyRef:
                      name: forward-dynatrace-credentials
                      key: forward-user
                - name: FORWARD_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: forward-dynatrace-credentials
                      key: forward-password
              volumeMounts:
                - name: config
                  mountPath: /etc/forward-dynatrace
                  readOnly: true
                - name: output
                  mountPath: /var/lib/forward-dynatrace
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: config
              configMap:
                name: forward-dynatrace-config
            - name: output
              emptyDir: {}
