apiVersion: batch/v1
kind: CronJob
metadata:
  name: forward-dynatrace-connector
  labels:
    app.kubernetes.io/name: forward-dynatrace-connector
    app.kubernetes.io/part-of: forward-dynatrace
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: forward-dynatrace-connector
            app.kubernetes.io/part-of: forward-dynatrace
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: importer
              image: "ghcr.io/forwardnetworks/forward-dynatrace-importer@sha256:<verified-64-hex-digest>"
              imagePullPolicy: IfNotPresent
              args:
                - "--config"
                - "/etc/forward-dynatrace/forward-connector.config.json"
              volumeMounts:
                - name: config
                  mountPath: /etc/forward-dynatrace
                  readOnly: true
                - name: handoff-read-token
                  mountPath: /etc/forward-dynatrace-secrets
                  readOnly: true
                - name: output
                  mountPath: /var/lib/forward-dynatrace
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: config
              configMap:
                name: forward-dynatrace-config
            - name: handoff-read-token
              secret:
                secretName: forward-dynatrace-credentials
                items:
                  - key: handoff-read-token
                    path: handoff-read-token
                  - key: forward-authorization
                    path: forward-authorization
                defaultMode: 0440
            - name: output
              emptyDir: {}
