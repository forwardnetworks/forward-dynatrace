apiVersion: batch/v1
kind: CronJob
metadata:
  name: forward-dynatrace-check-health
  labels:
    app.kubernetes.io/name: forward-dynatrace-check-health
    app.kubernetes.io/part-of: forward-dynatrace
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: forward-dynatrace-check-health
            app.kubernetes.io/part-of: forward-dynatrace
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: check-health
              image: "ghcr.io/forwardnetworks/forward-dynatrace-importer@sha256:<verified-64-hex-digest>"
              imagePullPolicy: IfNotPresent
              args:
                - "forward-check-health"
                - "--state"
                - "/var/lib/forward-dynatrace/check-health-state.json"
                - "--output"
                - "/var/lib/forward-dynatrace/check-health-transitions.json"
                - "--evidence-source"
                - "live-forward-poll"
                - "--apply"
                - "--token-file"
                - "/var/run/secrets/forward-dynatrace/platform-token"
              env:
                - name: FORWARD_BASE_URL
                  valueFrom:
                    configMapKeyRef:
                      name: forward-dynatrace-check-health-config
                      key: forward-base-url
                - name: FORWARD_NETWORK_ID
                  valueFrom:
                    configMapKeyRef:
                      name: forward-dynatrace-check-health-config
                      key: forward-network-id
                - name: DYNATRACE_ENVIRONMENT_URL
                  valueFrom:
                    configMapKeyRef:
                      name: forward-dynatrace-check-health-config
                      key: dynatrace-environment-url
                - name: FORWARD_AUTHORIZATION_FILE
                  value: /var/run/secrets/forward-dynatrace/forward-authorization
              volumeMounts:
                - name: state
                  mountPath: /var/lib/forward-dynatrace
                - name: dynatrace-token
                  mountPath: /var/run/secrets/forward-dynatrace
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: forward-dynatrace-state
            - name: dynatrace-token
              secret:
                secretName: forward-dynatrace-credentials
                items:
                  - key: dynatrace-platform-token
                    path: platform-token
                  - key: forward-authorization
                    path: forward-authorization
                defaultMode: 0440
