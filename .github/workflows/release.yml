name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  artifact-metadata: write
  attestations: write
  contents: write
  id-token: write
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/forward-dynatrace-importer
      HAS_RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY_PEM != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up Docker Buildx
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Validate release immutability before writes
        id: immutability
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/validate-release-immutability.mjs
          --release-name "${GITHUB_REF_NAME}"
          --repository "${GITHUB_REPOSITORY}"
          --commit-sha "${GITHUB_SHA}"
          --run-id "${GITHUB_RUN_ID}"
          --run-attempt "${GITHUB_RUN_ATTEMPT}"

      - name: Install dependencies
        run: npm ci

      - name: Run release gates
        run: npm run ci

      - name: Validate release tag and repository version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run release:ref:validate -- --release-name "${GITHUB_REF_NAME}"

      - name: Prepare release artifacts
        run: |
          rm -rf out/release
          npm run release:package -- --output-dir out/release --release-name "${GITHUB_REF_NAME}"

      - name: Self-sign release checksums
        if: startsWith(github.ref, 'refs/tags/') && env.HAS_RELEASE_SIGNING_KEY == 'true'
        env:
          RELEASE_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          install -m 700 -d "${RUNNER_TEMP}/forward-dynatrace-release-signing"
          printf '%s' "${RELEASE_SIGNING_PRIVATE_KEY_PEM}" > "${RUNNER_TEMP}/forward-dynatrace-release-signing/release-private.pem"
          chmod 600 "${RUNNER_TEMP}/forward-dynatrace-release-signing/release-private.pem"
          npm run release:sign -- \
            --checksums out/release/SHA256SUMS \
            --private-key "${RUNNER_TEMP}/forward-dynatrace-release-signing/release-private.pem" \
            --signature out/release/SHA256SUMS.sig \
            --public-key-output out/release/SHA256SUMS.pub

      - name: Attest release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest@v4
        with:
          subject-path: out/release/*

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: forward-dynatrace-release
          path: out/release/*
          if-no-files-found: error

      - name: Extract image metadata
        if: startsWith(github.ref, 'refs/tags/')
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and publish GHCR importer image
        if: startsWith(github.ref, 'refs/tags/')
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.forward-importer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Attest GHCR importer image
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Scan GHCR importer image
        if: startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy workflow artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: forward-dynatrace-trivy-sarif
          path: trivy-results.sarif
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.immutability.outputs.release_reset }}" = "true" ]; then
            if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
              gh release delete "${GITHUB_REF_NAME}" --yes
            fi
          fi
          gh release create "${GITHUB_REF_NAME}" out/release/* \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Forward for Dynatrace release. Verify downloaded artifacts with SHA256SUMS. If SHA256SUMS.sig and SHA256SUMS.pub are present, verify the self-managed release signature before trusting the checksum file. The Forward-side importer image is published to ${IMAGE_NAME}:${GITHUB_REF_NAME}."
